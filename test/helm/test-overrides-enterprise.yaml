# dtas versions could come from upstream chart but sometimes the versions we set
# here are not the same of the upstream docker images
audit-storage:
  messageBroker:
    url: failover:(tcp://activemq:61616)
    username: admin
    password: admin
dtas:
  config:
    assertions:
      acs:
        edition: Enterprise
        version: 25.3.0
        modules:
          - id: org_alfresco_device_sync_repo
            version: 5.3.0
            installed: true
          - id: org.alfresco.integrations.google.docs
            version: 4.1.0
            installed: true
          - id: alfresco-aos-module
            version: 3.4.1
            installed: true
          - id: alfresco-hxinsight-connector-hxinsight-extension
            version: 2.0.2
            installed: true
