alfresco-repository:
  resources:
    limits:
      memory: "3Gi"
elasticsearch:
  elasticsearch:
    resources:
      requests:
        memory: "1Gi"
      limits:
        memory: "1.5Gi"
alfresco-audit-storage:
  messageBroker:
    url: failover:(tcp://activemq:61616)
    username: admin
    password: admin
  environment:
    AUDIT_EVENTINGESTION_URI: "activemq:topic:alfresco.repo.event2"
    SPRING_PROFILES_ACTIVE: "virtual-topics"
