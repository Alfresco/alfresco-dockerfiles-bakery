# dtas versions could come from upstream chart but sometimes the versions we set
# here are not the same of the upstream docker images
dtas:
  config:
    assertions:
      acs:
        edition: Enterprise
        version: 23.6.1
        modules:
        - id: org_alfresco_device_sync_repo
          version: 5.3.0
          installed: true
        - id: org.alfresco.integrations.google.docs
          version: 4.1.0
          installed: true
        - id: alfresco-aos-module
          version: 3.4.1
          installed: true
alfresco-audit-storage:
  messageBroker:
    url: failover:(tcp://activemq:61616)
    username: admin
    password: admin
  environment:
    AUDIT_EVENTINGESTION_URI: "activemq:topic:alfresco.repo.event2"
    SPRING_PROFILES_ACTIVE: "virtual-topics"
