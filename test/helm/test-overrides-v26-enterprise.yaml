# dtas versions for ACS 26 Enterprise pre-release
dtas:
  config:
    assertions:
      acs:
        edition: Enterprise
        version: 26.1.0
        modules:
          - id: org_alfresco_device_sync_repo
            version: 5.3.0
            installed: true
          - id: org.alfresco.integrations.google.docs
            version: 4.1.0
            installed: true
          - id: alfresco-aos-module
            version: 3.4.1
            installed: true
          - id: alfresco-hxinsight-connector-hxinsight-extension
            version: 2.0.2
            installed: true
alfresco-repository:
  startupProbe:
    initialDelaySeconds: 120
alfresco-transform-service:
  pdfrenderer:
    livenessProbe:
      initialDelaySeconds: 120
  imagemagick:
    livenessProbe:
      initialDelaySeconds: 120
  libreoffice:
    livenessProbe:
      initialDelaySeconds: 120
  tika:
    livenessProbe:
      initialDelaySeconds: 120
  transformmisc:
    livenessProbe:
      initialDelaySeconds: 120
